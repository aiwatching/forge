id: docker
name: Docker
icon: 🐳
version: 1.0.0
author: forge
description: Build and manage Docker images

config:
  registry: { type: string, label: "Registry URL", description: "e.g., docker.io, harbor.example.com" }

params:
  image: { type: string, label: "Image Name", required: true }
  tag: { type: string, label: "Tag", default: "latest" }
  dockerfile: { type: string, label: "Dockerfile Path", default: "Dockerfile" }
  context: { type: string, label: "Build Context", default: "." }

actions:
  build:
    run: shell
    command: "docker build -t {{params.image}}:{{params.tag}} -f {{params.dockerfile}} {{params.context}}"
    timeout: 600
    output:
      image: "$stdout"

  push:
    run: shell
    command: "docker push {{config.registry}}/{{params.image}}:{{params.tag}}"
    timeout: 300
    output:
      digest: "$stdout"

  tag:
    run: shell
    command: "docker tag {{params.image}}:{{params.tag}} {{config.registry}}/{{params.image}}:{{params.tag}}"
    output:
      result: "$stdout"

defaultAction: build
